<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaWhoXqZGx-DLbwEJYFghlL2FyiJrLjOA",
  authDomain: "ql-benhnhan.firebaseapp.com",
  projectId: "ql-benhnhan",
  storageBucket: "ql-benhnhan.firebasestorage.app",
  messagingSenderId: "205264705273",
  appId: "1:205264705273:web:071eef6ee888a9a6907428"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let ds = [];
let idDangSua = null;

// LOAD
async function loadData() {
    const querySnapshot = await getDocs(collection(db, "benhnhan"));
    ds = [];
    querySnapshot.forEach((d) => {
        ds.push({ id: d.id, ...d.data() });
    });
    hienThi(ds);
}

// THÊM (ĐÃ FIX)
window.them = async function() {
    try {
        let ten = document.getElementById("ten").value;
        if (!ten) return alert("Nhập tên!");

        let data = layDuLieuForm();

        await addDoc(collection(db, "benhnhan"), data);

        alert("✅ Đã lưu lên Firebase");

        clearForm();
        loadData();

    } catch (e) {
        alert("❌ Lỗi: " + e.message);
        console.error(e);
    }
}

// LẤY DATA
function layDuLieuForm() {
    return {
        ten: document.getElementById("ten").value,
        namsinh: document.getElementById("namsinh").value,
        nha: document.getElementById("nha").value,
        thuoc: document.getElementById("thuoc").value,
        ngaykham: document.getElementById("ngaykham").value,
        ngaytaikham: document.getElementById("ngaytaikham").value
    };
}

// HIỂN THỊ
function hienThi(data) {
    let html = "";
    data.forEach(p => {
        html += `
        <tr>
            <td>${p.ten}</td>
            <td>${p.namsinh}</td>
            <td>${p.nha}</td>
            <td>${p.thuoc}</td>
            <td>${p.ngaykham}</td>
            <td>${p.ngaytaikham}</td>
        </tr>`;
    });
    document.getElementById("dulieu").innerHTML = html;
}

// CLEAR
function clearForm() {
    document.querySelectorAll("input").forEach(i => i.value = "");
}

// AUTO LOAD
window.onload = loadData;

</script>
