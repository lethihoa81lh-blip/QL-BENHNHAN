<body>

<h2>Quản lý bệnh nhân</h2>

<input type="text" id="ten" placeholder="Họ tên">
<input type="number" id="namsinh" placeholder="Năm sinh">
<input type="text" id="nha" placeholder="Nhà">
<input type="text" id="thuoc" placeholder="Thuốc dùng">

<br>

Ngày khám: <input type="date" id="ngaykham">
Ngày tái khám: <input type="date" id="ngaytaikham">

<br>

<button onclick="them()">Thêm</button>
<button onclick="xuatExcel()">Xuất Excel</button>

<br>

<input type="text" id="timkiem" placeholder="Tìm kiếm..." onkeyup="loc()">

<div class="container">
<table id="bangdulieu">

<thead>
<tr>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Thuốc</th>
<th>Ngày khám</th>
<th>Ngày tái khám</th>
</tr>
</thead>

<tbody id="dulieu"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  projectId: "XXXX",
  storageBucket: "XXXX",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let ds = [];

// ===== FORMAT DATE =====
function formatDateVN(dateStr) {
    if (!dateStr) return "";
    let d = new Date(dateStr);
    return d.toLocaleDateString('vi-VN');
}

// ===== THÊM =====
window.them = async function() {
    let ten = document.getElementById("ten").value;
    if (!ten) return alert("Nhập tên!");

    let data = {
        ten,
        namsinh: document.getElementById("namsinh").value,
        nha: document.getElementById("nha").value,
        thuoc: document.getElementById("thuoc").value,
        ngaykham: formatDateVN(document.getElementById("ngaykham").value),
        ngaytaikham: formatDateVN(document.getElementById("ngaytaikham").value)
    };

    await addDoc(collection(db, "benhnhan"), data);
    loadData();
    clearForm();
}

// ===== LOAD FIREBASE =====
async function loadData() {
    const querySnapshot = await getDocs(collection(db, "benhnhan"));
    ds = [];

    querySnapshot.forEach((doc) => {
        ds.push(doc.data());
    });

    hienThi(ds);
}

// ===== MIGRATE LOCAL → FIREBASE =====
async function migrate() {
    let local = JSON.parse(localStorage.getItem("ds_benhnhan")) || [];

    if (local.length > 0) {
        for (let item of local) {
            await addDoc(collection(db, "benhnhan"), item);
        }
        localStorage.removeItem("ds_benhnhan");
        alert("Đã chuyển dữ liệu cũ lên online!");
    }
}

// ===== HIỂN THỊ =====
function hienThi(data = ds) {
    let html = "";
    let today = new Date();
    today.setHours(0,0,0,0);

    data.forEach((p) => {

        let mau = "";

        if (p.ngaytaikham) {
            let parts = p.ngaytaikham.split("/");
            let d = new Date(parts[2], parts[1] - 1, parts[0]);
            d.setHours(0,0,0,0);

            let diff = Math.floor((d - today) / (1000*60*60*24));

            if (diff < 0) mau = "background:#ffcccc";
            else if (diff <= 3) mau = "background:#fff3cd";
        }

        html += `
        <tr style="${mau}">
            <td>${p.ten}</td>
            <td>${p.namsinh}</td>
            <td>${p.nha}</td>
            <td>${p.thuoc}</td>
            <td>${p.ngaykham}</td>
            <td>${p.ngaytaikham}</td>
        </tr>`;
    });

    document.getElementById("dulieu").innerHTML = html;
}
