<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý bệnh nhân</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }

input, button {
    padding: 6px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
}

th {
    position: sticky;
    top: 0;
    background: #f2f2f2;
}

.container {
    max-height: 400px;
    overflow-y: auto;
}
</style>
</head>

<body>

<h2>Quản lý bệnh nhân</h2>

<!-- FORM -->
<input type="text" id="ten" placeholder="Họ tên">
<input type="number" id="namsinh" placeholder="Năm sinh">
<input type="text" id="nha" placeholder="Nhà">
<input type="text" id="thuoc" placeholder="Thuốc dùng">

<br>

Ngày khám: <input type="date" id="ngaykham">
Ngày tái khám: <input type="date" id="ngaytaikham">

<br>

<button onclick="them()">Thêm</button>
<button onclick="xuatExcel()">Xuất Excel</button>

<br>

<input type="text" id="timkiem" placeholder="Lọc: tên / nhà / thuốc / ngày tái khám..." onkeyup="loc()">

<!-- BẢNG -->
<div class="container">
<table id="bangdulieu">
<thead>
<tr>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Thuốc</th>
<th>Ngày khám</th>
<th>Ngày tái khám</th>
</tr>
</thead>
<tbody id="dulieu"></tbody>
</table>
</div>

<script>
let ds = [];

// format ngày VN
function formatDateVN(dateStr) {
    if (!dateStr) return "";
    let d = new Date(dateStr);
    return d.toLocaleDateString('vi-VN');
}

// thêm bệnh nhân
function them() {
    let ten = document.getElementById("ten").value;
    let namsinh = document.getElementById("namsinh").value;
    let nha = document.getElementById("nha").value;
    let thuoc = document.getElementById("thuoc").value;
    let ngaykham = formatDateVN(document.getElementById("ngaykham").value);
    let ngaytaikham = formatDateVN(document.getElementById("ngaytaikham").value);

    if (!ten) {
        alert("Nhập tên!");
        return;
    }

    ds.push({ ten, namsinh, nha, thuoc, ngaykham, ngaytaikham });

    hienThi();
}

// hiển thị
function hienThi(data = ds) {
    let html = "";
    data.forEach(p => {
        html += `
        <tr>
            <td>${p.ten}</td>
            <td>${p.namsinh}</td>
            <td>${p.nha}</td>
            <td>${p.thuoc}</td>
            <td>${p.ngaykham}</td>
            <td>${p.ngaytaikham}</td>
        </tr>`;
    });

    document.getElementById("dulieu").innerHTML = html;
}

// lọc nâng cao
function loc() {
    let key = document.getElementById("timkiem").value.toLowerCase();

    let filtered = ds.filter(p =>
        (p.ten && p.ten.toLowerCase().includes(key)) ||
        (p.nha && p.nha.toLowerCase().includes(key)) ||
        (p.thuoc && p.thuoc.toLowerCase().includes(key)) ||
        (p.ngaytaikham && p.ngaytaikham.toLowerCase().includes(key))
    );

    hienThi(filtered);
}

// xuất excel
function xuatExcel() {
    let table = document.getElementById("bangdulieu");
    let wb = XLSX.utils.table_to_book(table, {sheet:"DanhSach"});
    XLSX.writeFile(wb, "benhnhan.xlsx");
}
</script>

</body>
</html>
