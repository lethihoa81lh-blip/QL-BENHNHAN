<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý bệnh nhân</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }

input, button {
    padding: 6px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: left;
}

th {
    position: sticky;
    top: 0;
    background: #f2f2f2;
}

.container {
    max-height: 400px;
    overflow-y: auto;
}

tr:hover {
    background: #eef;
}

button.small {
    padding: 4px 8px;
    margin: 2px;
}
</style>
</head>

<body>

<h2>Quản lý bệnh nhân</h2>

<!-- FORM -->
<input type="text" id="ten" placeholder="Họ tên">
<input type="number" id="namsinh" placeholder="Năm sinh">
<input type="text" id="nha" placeholder="Nhà">
<input type="text" id="thuoc" placeholder="Thuốc dùng">

<br>

Ngày khám: <input type="date" id="ngaykham">
Ngày tái khám: <input type="date" id="ngaytaikham">

<br>

<button onclick="them()">Thêm</button>
<button onclick="capNhat()">Cập nhật</button>
<button onclick="xuatExcel()">Xuất Excel</button>

<br>

<input type="text" id="timkiem" placeholder="Lọc..." onkeyup="loc()">

<!-- BẢNG -->
<div class="container">
<table id="bangdulieu">
<thead>
<tr>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Thuốc</th>
<th>Ngày khám</th>
<th>Ngày tái khám</th>
<th>Hành động</th>
</tr>
</thead>
<tbody id="dulieu"></tbody>
</table>
</div>

<script>
let ds = [];
let indexDangSua = -1;

// format ngày
function formatDateVN(dateStr) {
    if (!dateStr) return "";
    let d = new Date(dateStr);
    return d.toLocaleDateString('vi-VN');
}

// chuyển lại cho input
function toInputDate(dateStr) {
    if (!dateStr) return "";
    let p = dateStr.split("/");
    return p[2] + "-" + p[1].padStart(2,'0') + "-" + p[0].padStart(2,'0');
}

// thêm
function them() {
    let ten = document.getElementById("ten").value;
    if (!ten) return alert("Nhập tên!");

    ds.push({
        ten,
        namsinh: document.getElementById("namsinh").value,
        nha: document.getElementById("nha").value,
        thuoc: document.getElementById("thuoc").value,
        ngaykham: formatDateVN(document.getElementById("ngaykham").value),
        ngaytaikham: formatDateVN(document.getElementById("ngaytaikham").value)
    });

    hienThi();
    clearForm();
}

// hiển thị

    function hienThi(data = ds) {
    let html = "";
    let today = new Date();

    data.forEach((p, index) => {
        let mau = "";

        if (p.ngaytaikham) {
            let parts = p.ngaytaikham.split("/");
            let ngayTaiKham = new Date(parts[2], parts[1] - 1, parts[0]);

            let diff = (ngayTaiKham - today) / (1000 * 60 * 60 * 24);

            if (diff < 0) {
                mau = "background-color:#ffcccc"; // quá hạn (đỏ)
            } else if (diff <= 3) {
                mau = "background-color:#fff3cd"; // sắp tới (vàng)
            }
        }

        html += `
        <tr style="${mau}">
            <td>${p.ten}</td>
            <td>${p.namsinh}</td>
            <td>${p.nha}</td>
            <td>${p.thuoc}</td>
            <td>${p.ngaykham}</td>
            <td>${p.ngaytaikham}</td>
            <td>
                <button class="small" onclick="chon(${index})">Sửa</button>
                <button class="small" onclick="xoa(${index})">Xóa</button>
            </td>
        </tr>`;
    });

    document.getElementById("dulieu").innerHTML = html;
}
}

// chọn để sửa
function chon(index) {
    let p = ds[index];

    document.getElementById("ten").value = p.ten;
    document.getElementById("namsinh").value = p.namsinh;
    document.getElementById("nha").value = p.nha;
    document.getElementById("thuoc").value = p.thuoc;
    document.getElementById("ngaykham").value = toInputDate(p.ngaykham);
    document.getElementById("ngaytaikham").value = toInputDate(p.ngaytaikham);

    indexDangSua = index;
}

// cập nhật
function capNhat() {
    if (indexDangSua === -1) return alert("Chọn bệnh nhân cần sửa!");

    ds[indexDangSua] = {
        ten: document.getElementById("ten").value,
        namsinh: document.getElementById("namsinh").value,
        nha: document.getElementById("nha").value,
        thuoc: document.getElementById("thuoc").value,
        ngaykham: formatDateVN(document.getElementById("ngaykham").value),
        ngaytaikham: formatDateVN(document.getElementById("ngaytaikham").value)
    };

    hienThi();
    clearForm();
    indexDangSua = -1;
}

// xóa
function xoa(index) {
    if (confirm("Xóa bệnh nhân này?")) {
        ds.splice(index, 1);
        hienThi();
    }
}

// lọc
function loc() {
    let key = document.getElementById("timkiem").value.toLowerCase();

    let filtered = ds.filter(p =>
        (p.ten && p.ten.toLowerCase().includes(key)) ||
        (p.nha && p.nha.toLowerCase().includes(key)) ||
        (p.thuoc && p.thuoc.toLowerCase().includes(key)) ||
        (p.ngaytaikham && p.ngaytaikham.toLowerCase().includes(key))
    );

    hienThi(filtered);
}

// clear form
function clearForm() {
    document.getElementById("ten").value = "";
    document.getElementById("namsinh").value = "";
    document.getElementById("nha").value = "";
    document.getElementById("thuoc").value = "";
    document.getElementById("ngaykham").value = "";
    document.getElementById("ngaytaikham").value = "";
}

// xuất excel
function xuatExcel() {
    let table = document.getElementById("bangdulieu");
    let wb = XLSX.utils.table_to_book(table, {sheet:"DanhSach"});
    XLSX.writeFile(wb, "benhnhan.xlsx");
}
</script>

</body>
</html>
