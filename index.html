<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý bệnh nhân</title>

<!-- Thư viện Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    padding: 20px;
}

input, button {
    padding: 6px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: left;
}

th {
    position: sticky;
    top: 0;
    background: #f2f2f2;
}

.container {
    max-height: 400px;
    overflow-y: auto;
}
</style>
</head>

<body>

<h2>Quản lý bệnh nhân</h2>

<!-- Form nhập -->
<input type="text" id="ten" placeholder="Họ tên">
<input type="number" id="namsinh" placeholder="Năm sinh">
<input type="text" id="thuoc" placeholder="Thuốc dùng">
<input type="date" id="ngay">

<button onclick="them()">Thêm</button>
<button onclick="xuatExcel()">Xuất Excel</button>

<br>

<input type="text" id="timkiem" placeholder="Lọc tên..." onkeyup="locTen()">

<!-- Bảng -->
<div class="container">
<table id="bangdulieu">
    <thead>
        <tr>
            <th>Họ tên</th>
            <th>Năm sinh</th>
            <th>Thuốc</th>
            <th>Ngày khám</th>
        </tr>
    </thead>
    <tbody id="dulieu"></tbody>
</table>
</div>

<script>
// Lưu dữ liệu
let ds = [];

// Định dạng ngày VN
function formatDateVN(dateStr) {
    if (!dateStr) return "";
    let d = new Date(dateStr);
    return d.toLocaleDateString('vi-VN');
}

// Thêm bệnh nhân
function them() {
    let ten = document.getElementById("ten").value;
    let namsinh = document.getElementById("namsinh").value;
    let thuoc = document.getElementById("thuoc").value;
    let ngay = document.getElementById("ngay").value;

    let ngayVN = formatDateVN(ngay);

    if (!ten) {
        alert("Nhập tên!");
        return;
    }

    ds.push({ ten, namsinh, thuoc, ngay: ngayVN });

    hienThi();
}

// Hiển thị bảng
function hienThi() {
    let html = "";
    ds.forEach(p => {
        html += `
        <tr>
            <td>${p.ten}</td>
            <td>${p.namsinh}</td>
            <td>${p.thuoc}</td>
            <td>${p.ngay}</td>
        </tr>`;
    });

    document.getElementById("dulieu").innerHTML = html;
}

// Lọc tên
function locTen() {
    let keyword = document.getElementById("timkiem").value.toLowerCase();

    let html = "";
    ds.filter(p => p.ten.toLowerCase().includes(keyword))
      .forEach(p => {
        html += `
        <tr>
            <td>${p.ten}</td>
            <td>${p.namsinh}</td>
            <td>${p.thuoc}</td>
            <td>${p.ngay}</td>
        </tr>`;
    });

    document.getElementById("dulieu").innerHTML = html;
}

// Xuất Excel
function xuatExcel() {
    let table = document.getElementById("bangdulieu");
    let wb = XLSX.utils.table_to_book(table, {sheet:"DanhSach"});
    XLSX.writeFile(wb, "benhnhan.xlsx");
}
</script>

</body>
</html>
