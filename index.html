<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý bệnh nhân</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
input, button { padding: 6px; margin: 5px; }
table { width: 100%; border-collapse: collapse; }
th, td { border: 1px solid #ccc; padding: 8px; }
th { background: #f2f2f2; }
.container { max-height: 420px; overflow-y: auto; }
</style>
</head>

<body>

<h2>Quản lý bệnh nhân</h2>

<!-- FORM -->
<input id="ten" placeholder="Họ tên">
<input id="namsinh" placeholder="Năm sinh">
<input id="nha" placeholder="Nhà">

<input id="chandoan1" placeholder="Chẩn đoán 1">
<input id="chandoan2" placeholder="Chẩn đoán 2">

<input id="bhyt" placeholder="Số thẻ BHYT">

<br>

<button onclick="them()">Thêm</button>
<button onclick="capNhat()">Cập nhật</button>
<button onclick="xuatExcel()">Xuất Excel</button>

<!-- TABLE -->
<div class="container">
<table>
<thead>
<tr>
<th>Họ tên<br><input id="locTen" onkeyup="locCot()"></th>
<th>Năm sinh<br><input id="locNam" onkeyup="locCot()"></th>
<th>Nhà<br><input id="locNha" onkeyup="locCot()"></th>
<th>Chẩn đoán 1<br><input id="locCD1" onkeyup="locCot()"></th>
<th>Chẩn đoán 2</th>
<th>BHYT<br><input id="locBHYT" onkeyup="locCot()"></th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="dulieu"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaWhoXqZGx-DLbwEJYFghlL2FyiJrLjOA",
  authDomain: "ql-benhnhan.firebaseapp.com",
  projectId: "ql-benhnhan",
  storageBucket: "ql-benhnhan.firebasestorage.app",
  messagingSenderId: "205264705273",
  appId: "1:205264705273:web:071eef6ee888a9a6907428"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let ds = [];
let idDangSua = null;

/* LOAD */
async function loadData() {
    const snap = await getDocs(collection(db, "benhnhan"));
    ds = [];
    snap.forEach(d => ds.push({ id: d.id, ...d.data() }));
    hienThi(ds);
}

/* GET DATA */
function layData() {
    return {
        ten: ten.value,
        namsinh: namsinh.value,
        nha: nha.value,
        chandoan1: chandoan1.value,
        chandoan2: chandoan2.value,
        bhyt: bhyt.value
    };
}

/* THÊM */
window.them = async function () {
    if (!ten.value) return alert("Nhập họ tên!");
    await addDoc(collection(db, "benhnhan"), layData());
    clearForm();
    loadData();
}

/* HIỂN THỊ */
function hienThi(data) {
    let html = "";

    data.forEach(p => {
        html += `
        <tr>
            <td>${p.ten || ""}</td>
            <td>${p.namsinh || ""}</td>
            <td>${p.nha || ""}</td>
            <td>${p.chandoan1 || ""}</td>
            <td>${p.chandoan2 || ""}</td>
            <td>${p.bhyt || ""}</td>
            <td>
                <button onclick="sua('${p.id}')">Sửa</button>
                <button onclick="xoa('${p.id}')">Xoá</button>
            </td>
        </tr>`;
    });

    dulieu.innerHTML = html;
}

/* XOÁ */
window.xoa = async function (id) {
    await deleteDoc(doc(db, "benhnhan", id));
    loadData();
}

/* SỬA */
window.sua = function (id) {
    let p = ds.find(x => x.id == id);

    ten.value = p.ten;
    namsinh.value = p.namsinh;
    nha.value = p.nha;
    chandoan1.value = p.chandoan1;
    chandoan2.value = p.chandoan2;
    bhyt.value = p.bhyt;

    idDangSua = id;
}

/* CẬP NHẬT */
window.capNhat = async function () {
    if (!idDangSua) return alert("Chọn bệnh nhân để sửa");

    await updateDoc(doc(db, "benhnhan", idDangSua), layData());
    idDangSua = null;
    clearForm();
    loadData();
}

/* LỌC */
window.locCot = function () {
    let f = ds.filter(p =>
        (p.ten || "").toLowerCase().includes(locTen.value.toLowerCase()) &&
        (p.namsinh || "").includes(locNam.value) &&
        (p.nha || "").toLowerCase().includes(locNha.value.toLowerCase()) &&
        (p.chandoan1 || "").toLowerCase().includes(locCD1.value.toLowerCase()) &&
        (p.bhyt || "").toLowerCase().includes(locBHYT.value.toLowerCase())
    );

    hienThi(f);
}

/* CLEAR FORM */
function clearForm() {
    ten.value = "";
    namsinh.value = "";
    nha.value = "";
    chandoan1.value = "";
    chandoan2.value = "";
    bhyt.value = "";
}

/* EXCEL */
window.xuatExcel = function () {
    let data = ds.map(p => ({
        "Họ tên": p.ten,
        "Năm sinh": p.namsinh,
        "Nhà": p.nha,
        "Chẩn đoán 1": p.chandoan1,
        "Chẩn đoán 2": p.chandoan2,
        "BHYT": p.bhyt
    }));

    let wb = XLSX.utils.book_new();
    let ws = XLSX.utils.json_to_sheet(data);
    XLSX.utils.book_append_sheet(wb, ws, "Danh sách");
    XLSX.writeFile(wb, "benhnhan.xlsx");
}

/* INIT */
window.onload = loadData;

</script>

</body>
</html>
